name: papaya-test

services:
  postgres:
    image: postgres
    container_name: papaya-test-postgres
    environment:
      POSTGRES_DB: papaya-test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - papaya-test_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  papaya-test_postgres_data:
